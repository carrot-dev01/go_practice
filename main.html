<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arco</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #f5f4f0;
  --surface: #eceae4;
  --border:  #ccc9be;
  --text:    #1a1a18;
  --muted:   #8a8880;
  --accent:  #b07d3a;
  --accdim:  #d4b87a;
  --hand:    #1a1a18;
  --red:     #c94040;
  --green:   #3a9e5a;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:      #0e0e10;
    --surface: #17171a;
    --border:  #2a2a30;
    --text:    #e8e8e0;
    --muted:   #5a5a62;
    --accent:  #c8a96e;
    --accdim:  #5a4820;
    --hand:    #e8e8e0;
    --red:     #e05555;
    --green:   #5ec47a;
  }
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-weight: 300;
}

.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.5rem 1rem 2rem; gap: 1.1rem;
  transition: opacity 0.3s, transform 0.3s;
}
.screen.hidden { opacity: 0; pointer-events: none; transform: translateY(10px); }

/* ── 제목 ── */
#title-block {
  display: flex; flex-direction: column; align-items: flex-start;
  width: 100%; max-width: 320px; gap: 2px;
  margin-top: -6rem; margin-bottom: 3.4rem;
}
#title-main {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 36px; color: var(--accent);
  letter-spacing: -0.01em; line-height: 1;
}
#title-sub {
  font-size: 9px; color: var(--muted);
  letter-spacing: 0.12em; text-transform: uppercase;
}

/* ── 모델 로딩 배지 ── */
#model-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--muted); letter-spacing: 0.06em;
  width: 100%; max-width: 320px;
}
#model-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0;
  transition: background 0.4s;
}
#model-dot.loading { background: var(--accdim); animation: pulse 1.2s infinite; }
#model-dot.ready   { background: var(--green); }
#model-dot.error   { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── 상단 디지털 ── */
.top-row {
  display: flex; justify-content: space-between; align-items: flex-end;
  width: 100%; max-width: 320px;
}
.dg { display: flex; flex-direction: column; gap: 2px; }
.dg.r { text-align: right; }
.dlbl { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.dnum { font-family: 'DM Mono', monospace; font-size: 22px; color: var(--text); letter-spacing: 0.02em; }
.dnum.hi { color: var(--accent); }

/* ── 드럼 피커 ── */
#drum-outer {
  position: relative; height: 160px; overflow: hidden;
  border-radius: 12px; background: var(--surface);
  width: 100%; max-width: 320px;
  cursor: grab; user-select: none; touch-action: none;
}
#drum-outer:active { cursor: grabbing; }
#drum-outer::before, #drum-outer::after {
  content: ''; position: absolute; left: 0; right: 0; height: 60px; z-index: 2; pointer-events: none;
}
#drum-outer::before { top: 0; background: linear-gradient(to bottom, var(--surface) 30%, transparent); }
#drum-outer::after  { bottom: 0; background: linear-gradient(to top, var(--surface) 30%, transparent); }
.sel-line {
  position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
  height: 40px; pointer-events: none; z-index: 1;
  border-top: 0.5px solid var(--accent); border-bottom: 0.5px solid var(--accent);
}
#drum-inner {
  position: absolute; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center;
  will-change: transform;
}
.drum-item {
  height: 40px; width: 100%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 18px; color: var(--muted);
  user-select: none; pointer-events: none; flex-shrink: 0;
}
.drum-item.active { color: var(--accent); font-size: 22px; font-weight: 400; }
.drum-pad { height: 60px; width: 100%; flex-shrink: 0; }

/* ── 버튼 ── */
.btn-row { display: flex; gap: 8px; width: 100%; max-width: 320px; }
.btn {
  flex: 1; padding: 13px; background: transparent;
  border: 0.5px solid var(--border); border-radius: 10px;
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 13px; cursor: pointer; letter-spacing: 0.04em;
  transition: border-color 0.2s, color 0.2s, opacity 0.2s;
}
.btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.btn.active-mic { border-color: var(--green); color: var(--green); }
.btn.primary    { border-color: var(--accent); color: var(--accent); }
.btn.danger     { border-color: var(--red); color: var(--red); }
.btn.warn       { border-color: var(--accent); color: var(--accent); }
.btn:disabled   { opacity: 0.3; cursor: default; }

/* ── 상태 바 ── */
#sbar {
  display: flex; justify-content: space-between; align-items: center;
  width: 100%; max-width: 320px; height: 16px;
}
#sdot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted); transition: background 0.4s;
  margin-right: 7px; flex-shrink: 0;
}
#sdot.on  { background: var(--accent); }
#sdot.mic { background: var(--green); }
#stxt { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }
#note { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); opacity: 0; transition: opacity 0.3s; }
#note.show { opacity: 1; }

/* ── 진행 바 ── */
#pwrap { width: 100%; max-width: 320px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
#pbar  { height: 100%; background: var(--accent); width: 100%; border-radius: 2px; transition: width 0.8s linear; }

/* ── 통계 ── */
#stats { display: flex; gap: 1px; width: 100%; max-width: 320px; }
.sb { flex: 1; background: var(--surface); padding: 0.85rem 1rem; display: flex; flex-direction: column; gap: 3px; }
.sb:first-child { border-radius: 10px 0 0 10px; }
.sb:last-child  { border-radius: 0 10px 10px 0; }
.slbl { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
.sval { font-family: 'DM Mono', monospace; font-size: 17px; color: var(--text); }

/* ── 토스트 ── */
#toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 10px; padding: 10px 20px; font-size: 13px;
  color: var(--text); opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══════════ 홈 화면 ══════════ -->
<div class="screen" id="home-screen">

  <div id="title-block">
    <span id="title-main">Arco</span>
    <span id="title-sub">String instrument practice timer</span>
  </div>

  <div class="top-row">
    <div class="dg">
      <span class="dlbl">현재 시각</span>
      <span class="dnum" id="h-now">--:--:--</span>
    </div>
    <div class="dg r">
      <span class="dlbl">목표</span>
      <span class="dnum hi" id="h-goal">30분</span>
    </div>
  </div>

  <div id="drum-outer">
    <div class="sel-line"></div>
    <div id="drum-inner"></div>
  </div>

  <!-- 모델 로딩 상태 -->
  <div id="model-badge">
    <div id="model-dot" class="loading"></div>
    <span id="model-txt">Loading AI model...</span>
  </div>

  <div class="btn-row">
    <button class="btn" id="mic-toggle-btn" onclick="toggleMic()">마이크 켜기</button>
    <button class="btn" id="start-btn" onclick="startSession()" disabled>시작</button>
  </div>

</div>

<!-- ══════════ 시계 화면 ══════════ -->
<div class="screen hidden" id="clock-screen">

  <div class="top-row">
    <div class="dg">
      <span class="dlbl">현재 시각</span>
      <span class="dnum" id="c-now">--:--:--</span>
    </div>
    <div class="dg r">
      <span class="dlbl" id="c-goal-lbl">30분 설정 · 목표까지</span>
      <span class="dnum hi" id="c-left">--:--</span>
    </div>
  </div>

  <div id="sbar">
    <div style="display:flex;align-items:center">
      <div id="sdot"></div>
      <span id="stxt">연주를 시작하세요</span>
    </div>
    <span id="note"></span>
  </div>

  <canvas id="clk" width="320" height="320"></canvas>

  <div id="pwrap"><div id="pbar"></div></div>

  <div id="stats">
    <div class="sb">
      <span class="slbl">이번 총 연주</span>
      <span class="sval" id="v-total">0초</span>
    </div>
    <div class="sb">
      <span class="slbl">지금 연속</span>
      <span class="sval" id="v-sess">0초</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn warn" id="pause-btn" onclick="togglePause()">연습 중지</button>
    <button class="btn danger" onclick="endSession()">연습 끝</button>
  </div>

</div>

<div id="toast"></div>

<!-- TensorFlow.js -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>

<script>
// ── 감지 설정 ──────────────────────────────
const D = {
  // FFT 1차 필터 (빠름, 매 프레임 실행)
  FFT:         4096,
  SMOOTH:      0.88,
  HZ_MIN:        80,
  HZ_MAX:      4800,
  FLOOR:        -52,
  PEAK_MARGIN:    4,
  HARM_DROP:     35,
  HARM_MIN:       2,
  HOLD:          180,  // 60=~1초 유지

  // YAMNet 설정
  YAMNET_INTERVAL_MS: 975,   // ~1초마다 실행
  YAMNET_THRESHOLD:   0.25,  // 현악기 스코어 임계값 (0~1)
  YAMNET_SAMPLE_RATE: 16000, // YAMNet 요구 샘플레이트
  YAMNET_INPUT_LEN:   15600, // 0.975초 × 16000
};

// ── YAMNet 모델 ────────────────────────────
let yamnetModel  = null;
let yamnetReady  = false;
let yamnetStringIndices = new Set();

// 시작 버튼 상태: 마이크 + AI 모델 둘 다 준비돼야 활성화
function updateStartBtn() {
  const startBtn = document.getElementById('start-btn');
  const ready = micReady && yamnetReady;
  startBtn.disabled = !ready;
  if (ready) startBtn.classList.add('primary');
  else startBtn.classList.remove('primary');
}

async function loadYamnet() {
  setModelStatus('loading', 'Loading AI model...');
  try {
    // TF.js가 로드될 때까지 대기
    let waited = 0;
    while (typeof tf === 'undefined' && waited < 10000) {
      await new Promise(r => setTimeout(r, 200));
      waited += 200;
    }
    if (typeof tf === 'undefined') throw new Error('TF.js not loaded');

    // YAMNet을 TFHub에서 직접 로드
    yamnetModel = await tf.loadGraphModel(
      'https://tfhub.dev/google/tfjs-model/yamnet/tfjs/1',
      { fromTFHub: true }
    );

    // 클래스 이름은 직접 정의 (현악기 관련 인덱스만)
    // YAMNet 521개 클래스 중 현악기 관련 인덱스
    // 402=Violin, 403=Fiddle, 404=Guitar acoustic, 411=Cello, 414=Bowed string
    yamnetStringIndices = new Set([
      132,  // Violin, fiddle
      133,  // Plucked string instrument
      134,  // Guitar
      135,  // Electric guitar
      136,  // Bass guitar
      137,  // Acoustic guitar
      138,  // Steel guitar
      139,  // Banjo
      140,  // Sitar
      141,  // Mandolin
      142,  // Zither
      143,  // Ukulele
      144,  // Cello
      145,  // Double bass
      146,  // Violin section
      147,  // Bowed string instrument
    ]);
    yamnetReady = true;
    setModelStatus('ready', 'AI model ready');
    updateStartBtn();
  } catch(e) {
    setModelStatus('error', 'AI model failed — using basic detection');
    console.warn('YAMNet load failed:', e);
  }
}

function setModelStatus(state, msg) {
  document.getElementById('model-dot').className = state;
  document.getElementById('model-txt').textContent = msg;
}

loadYamnet(); // 페이지 로드 즉시 시작

// ── 드럼 피커 ──────────────────────────────
const ITEM_H = 40, MIN_G = 1, MAX_G = 60;
let goalMin = 30;
const drumOuter = document.getElementById('drum-outer');
const drumInner = document.getElementById('drum-inner');

const padTop = document.createElement('div'); padTop.className='drum-pad'; drumInner.appendChild(padTop);
for (let i = MIN_G; i <= MAX_G; i++) {
  const el = document.createElement('div');
  el.className = 'drum-item';
  el.textContent = i + '분';
  drumInner.appendChild(el);
}
const padBot = document.createElement('div'); padBot.className='drum-pad'; drumInner.appendChild(padBot);

let drumY = 0, isDragging = false, dragStartY = 0, dragStartDrumY = 0;
function minToY(m) { return -(m - MIN_G) * ITEM_H; }
function yToMin(y) { return Math.round(-y / ITEM_H) + MIN_G; }

function setDrumY(y, animate=false) {
  drumY = y;
  drumInner.style.transition = animate ? 'transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
  drumInner.style.transform  = `translateY(${y}px)`;
  const m = Math.max(MIN_G, Math.min(MAX_G, yToMin(y)));
  document.querySelectorAll('.drum-item').forEach((el, i) => el.classList.toggle('active', i + MIN_G === m));
}
function snapToNearest() {
  goalMin = Math.max(MIN_G, Math.min(MAX_G, yToMin(drumY)));
  setDrumY(minToY(goalMin), true);
  document.getElementById('h-goal').textContent = goalMin + '분';
  document.getElementById('c-goal-lbl').textContent = goalMin + '분 설정 · 목표까지';
}

drumOuter.addEventListener('mousedown', e => {
  isDragging=true; dragStartY=e.clientY; dragStartDrumY=drumY;
  drumInner.style.transition='none'; e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const raw = dragStartDrumY + (e.clientY - dragStartY);
  setDrumY(Math.max(minToY(MAX_G), Math.min(minToY(MIN_G), raw)));
});
window.addEventListener('mouseup', () => { if (isDragging) { isDragging=false; snapToNearest(); } });
drumOuter.addEventListener('touchstart', e => {
  isDragging=true; dragStartY=e.touches[0].clientY; dragStartDrumY=drumY;
  drumInner.style.transition='none';
}, {passive:true});
drumOuter.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const raw = dragStartDrumY + (e.touches[0].clientY - dragStartY);
  setDrumY(Math.max(minToY(MAX_G), Math.min(minToY(MIN_G), raw)));
}, {passive:true});
drumOuter.addEventListener('touchend', () => { if (isDragging) { isDragging=false; snapToNearest(); } });

setDrumY(minToY(goalMin));
setTimeout(() => setDrumY(minToY(goalMin)), 30);

// ── 오디오 상태 ────────────────────────────
let micReady=false, micStream=null;
let analyser=null, fData=null, bufLen=0, sRate=44100;
let scriptProcessor=null;
// 16kHz 리샘플 버퍼 (YAMNet용)
let pcmBuffer16k = new Float32Array(D.YAMNET_INPUT_LEN * 2);
let pcmWritePos  = 0;

async function toggleMic() {
  const btn      = document.getElementById('mic-toggle-btn');
  const startBtn = document.getElementById('start-btn');
  if (!micReady) {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({audio:true});
      const ac  = new(window.AudioContext||window.webkitAudioContext)();
      sRate     = ac.sampleRate;

      // FFT 분석기
      analyser  = ac.createAnalyser();
      analyser.fftSize = D.FFT;
      analyser.smoothingTimeConstant = D.SMOOTH;
      bufLen    = analyser.frequencyBinCount;
      fData     = new Float32Array(bufLen);

      // PCM 수집기 (YAMNet용 16kHz 리샘플)
      scriptProcessor = ac.createScriptProcessor(4096, 1, 1);
      const downsampleRatio = sRate / D.YAMNET_SAMPLE_RATE;
      scriptProcessor.onaudioprocess = (e) => {
        const input = e.inputBuffer.getChannelData(0);
        for (let i = 0; i < input.length; i += downsampleRatio) {
          pcmBuffer16k[pcmWritePos % pcmBuffer16k.length] = input[Math.floor(i)];
          pcmWritePos++;
        }
      };

      const src = ac.createMediaStreamSource(micStream);
      src.connect(analyser);
      src.connect(scriptProcessor);
      scriptProcessor.connect(ac.destination);

      micReady = true;
      btn.textContent = '마이크 끄기'; btn.classList.add('active-mic');
      // 마이크 + AI 모델 둘 다 준비됐을 때만 시작 가능
      updateStartBtn();
    } catch(e) { showToast('마이크 오류: ' + e.message); }
  } else {
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (scriptProcessor) scriptProcessor.disconnect();
    micStream=null; analyser=null; scriptProcessor=null; micReady=false;
    pcmWritePos=0;
    btn.textContent='마이크 켜기'; btn.classList.remove('active-mic');
    updateStartBtn();
  }
}

// ── 세션 ───────────────────────────────────
let running=false, paused=false;
let wakeLock = null;
let strOK=false, detFreq=0, hold=0;
let totalSec=0, sessSec=0, goalDone=false;
let statsTimer=null, lastMs=Date.now(), animMs=0;
// YAMNet 결과 캐시
let yamnetOK = false;
let lastYamnetMs = 0;
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function startSession() {
  totalSec=0; sessSec=0; animMs=0; goalDone=false;
  paused=false; hold=0; strOK=false; yamnetOK=false; lastYamnetMs=0;
  running=true;
  document.getElementById('home-screen').classList.add('hidden');
  document.getElementById('clock-screen').classList.remove('hidden');
  document.getElementById('sdot').className='mic';
  document.getElementById('stxt').textContent='연주를 시작하세요';
  document.getElementById('pause-btn').textContent='연습 중지';
  document.getElementById('pause-btn').classList.remove('primary');
  document.getElementById('pause-btn').classList.add('warn');
  refresh();
  clearInterval(statsTimer);
  requestWakeLock();
  statsTimer=setInterval(()=>{ if(running&&!paused&&strOK){ sessSec++;totalSec++;refresh(); } },1000);
}

async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {
  }
}

function togglePause() {
  paused=!paused;
  const btn=document.getElementById('pause-btn');
  if(paused){
    btn.textContent='연습 재개'; btn.classList.remove('warn'); btn.classList.add('primary');
    document.getElementById('sdot').className='';
    document.getElementById('stxt').textContent='일시 중지됨';
    strOK=false; hold=0; yamnetOK=false;
  } else {
    btn.textContent='연습 중지'; btn.classList.remove('primary'); btn.classList.add('warn');
    document.getElementById('sdot').className='mic';
    document.getElementById('stxt').textContent='연주를 시작하세요';
  }
}

function endSession() {
  running=false; paused=false; strOK=false; hold=0; yamnetOK=false;
  totalSec=0; sessSec=0; animMs=0;
  clearInterval(statsTimer);
  document.getElementById('sdot').className='';
  document.getElementById('note').classList.remove('show');
  document.getElementById('clock-screen').classList.add('hidden');
  document.getElementById('home-screen').classList.remove('hidden');
}

// ── 화면 갱신 ──────────────────────────────
function fmt(s) {
  const m=Math.floor(s/60),r=Math.floor(s%60);
  if(m===0)return r+'초'; if(r===0)return m+'분'; return m+'분 '+r+'초';
}
function mmss(s) {
  return String(Math.floor(s/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0');
}
function refresh() {
  document.getElementById('v-total').textContent=fmt(totalSec);
  document.getElementById('v-sess').textContent=fmt(sessSec);
  const rem=Math.max(0,goalMin*60-animMs/1000);
  document.getElementById('c-left').textContent=mmss(rem);
  const pct=Math.max(0,100-(animMs/1000)/(goalMin*60)*100);
  document.getElementById('pbar').style.width=pct+'%';
  if(running&&!goalDone&&animMs/1000>=goalMin*60){
    goalDone=true; showToast('목표 달성! 수고하셨어요 🎻');
  }
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── FFT 1차 필터 (빠름) ────────────────────
function fftGate() {
  if(!analyser) return false;
  analyser.getFloatFrequencyData(fData);
  const lo=Math.floor(D.HZ_MIN*bufLen*2/sRate);
  const hi=Math.min(Math.floor(D.HZ_MAX*bufLen*2/sRate),bufLen-1);
  let peak=-Infinity,pkB=0,sum=0,n=0;
  for(let i=lo;i<=hi;i++){
    if(fData[i]>peak){peak=fData[i];pkB=i;}
    if(fData[i]>-90){sum+=fData[i];n++;}
  }
  if(peak<D.FLOOR||n===0)return false;
  if(peak-sum/n<D.PEAK_MARGIN)return false;
  let h=0;
  for(const m of[2,3,4,5]){
    const b=Math.round(pkB*m);
    if(b<bufLen&&fData[b]>peak-D.HARM_DROP)h++;
  }
  if(h<D.HARM_MIN)return false;
  detFreq=Math.round(pkB*sRate/(bufLen*2));
  return true;
}

// ── YAMNet 2차 분류 (비동기, ~1초마다) ────────
let yamnetRunning = false;
async function runYamnet() {
  if(!yamnetReady||yamnetRunning||pcmWritePos<D.YAMNET_INPUT_LEN) return;
  yamnetRunning=true;
  try {
    const samples = new Float32Array(D.YAMNET_INPUT_LEN);
    const startPos = pcmWritePos - D.YAMNET_INPUT_LEN;
    for(let i=0;i<D.YAMNET_INPUT_LEN;i++){
      samples[i] = pcmBuffer16k[(startPos+i) % pcmBuffer16k.length];
    }

    const waveform = tf.tensor1d(samples);
    const result   = yamnetModel.predict(waveform);
    // result shape: [frames, 521] — 각 프레임의 클래스 스코어
    const scores   = result instanceof Array ? result[0] : result;
    const scoresArr = await scores.array();

    // 프레임별 현악기 스코어 최대값
    let maxScore = 0;
    const frames = Array.isArray(scoresArr[0]) ? scoresArr : [scoresArr];
    for (const frame of frames) {
      for (const idx of yamnetStringIndices) {
        if (frame[idx] > maxScore) maxScore = frame[idx];
      }
    }

    yamnetOK = maxScore >= D.YAMNET_THRESHOLD;
    waveform.dispose();
    if (scores !== result) scores.dispose();
  } catch(e) {
    yamnetOK = true; // 실패시 FFT만으로 fallback
  }
  yamnetRunning=false;
}

function noteStr(f) {
  if(!f)return '';
  const s=12*Math.log2(f/440),midi=Math.round(s)+69;
  return NOTES[((midi%12)+12)%12]+(Math.floor(midi/12)-1)+' · '+f+'Hz';
}

// ── 시계 그리기 ────────────────────────────
const cv=document.getElementById('clk'), ctx=cv.getContext('2d');

function drawClock(elapsedSec,active){
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=cx-18;
  ctx.clearRect(0,0,W,H);
  const st=getComputedStyle(document.documentElement);
  const C={
    accent:st.getPropertyValue('--accent').trim(),
    accdim:st.getPropertyValue('--accdim').trim(),
    border:st.getPropertyValue('--border').trim(),
    muted: st.getPropertyValue('--muted').trim(),
    text:  st.getPropertyValue('--text').trim(),
    bg:    st.getPropertyValue('--bg').trim(),
    hand:  st.getPropertyValue('--hand').trim(),
  };
  const goalSec=goalMin*60;
  const remaining=Math.max(0,1-elapsedSec/goalSec);
  const goalAngle=(goalMin/60)*Math.PI*2-Math.PI/2;
  const handAngle=-Math.PI/2+remaining*(goalMin/60)*Math.PI*2;

  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle=C.border;ctx.lineWidth=2.5;ctx.stroke();

  if(remaining>0.001){
    ctx.beginPath();ctx.arc(cx,cy,R-8,-Math.PI/2,handAngle,false);
    ctx.strokeStyle=active?C.accent:C.accdim;
    ctx.lineWidth=7;ctx.lineCap='round';ctx.stroke();
  }

  for(let i=0;i<60;i++){
    const a=(i/60)*Math.PI*2-Math.PI/2;
    const big=i%5===0;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*(big?R-25:R-13),cy+Math.sin(a)*(big?R-25:R-13));
    ctx.lineTo(cx+Math.cos(a)*(R-4),          cy+Math.sin(a)*(R-4));
    ctx.strokeStyle=big?(active?C.accent:C.muted):C.border;
    ctx.lineWidth=big?2:0.6;ctx.lineCap='square';ctx.stroke();
    if(big){
      ctx.font='500 12px "DM Mono",monospace';
      ctx.fillStyle=active?C.text:C.muted;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(String(i),cx+Math.cos(a)*(R-40),cy+Math.sin(a)*(R-40));
    }
  }

  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(goalAngle)*(R-25),cy+Math.sin(goalAngle)*(R-25));
  ctx.lineTo(cx+Math.cos(goalAngle)*(R-4), cy+Math.sin(goalAngle)*(R-4));
  ctx.strokeStyle=C.accent;ctx.lineWidth=3.5;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx+Math.cos(goalAngle)*(R-31),cy+Math.sin(goalAngle)*(R-31),3.5,0,Math.PI*2);
  ctx.fillStyle=C.accent;ctx.fill();

  ctx.lineCap='round';
  ctx.strokeStyle=active?C.hand:C.muted;ctx.lineWidth=3.5;
  ctx.beginPath();
  ctx.moveTo(cx-Math.cos(handAngle)*R*0.13,cy-Math.sin(handAngle)*R*0.13);
  ctx.lineTo(cx+Math.cos(handAngle)*R*0.74,cy+Math.sin(handAngle)*R*0.74);
  ctx.stroke();

  ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fillStyle=active?C.accent:C.muted;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,2.2,0,Math.PI*2);ctx.fillStyle=C.bg;ctx.fill();
}

// ── 메인 루프 ──────────────────────────────
function frame(){
  const now=Date.now(),dt=now-lastMs;lastMs=now;
  const d=new Date(now);
  const ts=String(d.getHours()).padStart(2,'0')+':'+
           String(d.getMinutes()).padStart(2,'0')+':'+
           String(d.getSeconds()).padStart(2,'0');
  document.getElementById('h-now').textContent=ts;
  document.getElementById('c-now').textContent=ts;

  if(running&&!paused&&analyser){
    const fftPass = fftGate();

    // YAMNet: FFT 통과했을 때만, 일정 간격으로 실행
    if(fftPass && now-lastYamnetMs > D.YAMNET_INTERVAL_MS){
      lastYamnetMs=now;
      runYamnet(); // 비동기, 결과는 yamnetOK에 반영
    }
    // FFT 안 통과하면 yamnetOK 리셋
    if(!fftPass) yamnetOK=false;

    // 최종 판정: FFT 통과 AND (YAMNet 통과 OR YAMNet 미준비)
    const detected = fftPass && (yamnetOK || !yamnetReady);
    hold = detected ? D.HOLD : Math.max(0,hold-1);
    strOK = hold > 0;

    const sdot=document.getElementById('sdot');
    const stxt=document.getElementById('stxt');
    const noteEl=document.getElementById('note');

    if(strOK){
      animMs+=dt;
      sdot.className='on';
      stxt.textContent = yamnetReady ? '현악기 감지됨' : '소리 감지됨';
      if(fftPass&&detFreq){noteEl.textContent=noteStr(detFreq);noteEl.classList.add('show');}
      refresh();
    } else {
      if (sessSec > 0) sessSec = 0;  // 연주 끊기면 연속 리셋
      sdot.className='mic';
      stxt.textContent='연주를 시작하세요';
      noteEl.classList.remove('show');
    }
  }

  drawClock(animMs/1000,strOK);
  requestAnimationFrame(frame);
}

lastMs=Date.now();
requestAnimationFrame(frame);
</script>
